---
# ─────────────────────────────────────────────
#  Profile: PROD  (Supabase)
# ─────────────────────────────────────────────
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${DATABASE_URL}            # jdbc:postgresql://db.xxx.supabase.co:5432/postgres
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    show-sql: false

logging:
  level:
    com.aromasenja: INFO
    root: WARN