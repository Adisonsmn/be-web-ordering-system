# ─────────────────────────────────────────────
#  application.yml  —  Aroma Senja Backend
#  Profile aktif default: dev
# ─────────────────────────────────────────────

spring:
  application:
    name: aroma-senja-backend

  profiles:
    active: dev

  # JPA
  jpa:
    hibernate:
      ddl-auto: validate          # Flyway yang handle DDL, bukan Hibernate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # Flyway — auto migration saat startup
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: false

  # Jackson
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

# ── JWT Config ──────────────────────────────
app:
  jwt:
    secret: ${JWT_SECRET:YXJvbWEtc2VuamEtand0LXNlY3JldC1rZXktZGV2LTIwMjQtc2VjdXJlLXJhbmRvbS1zdHJpbmc=}  # Override via env JWT_SECRET di production
    access-token-expiry: 900000     # 15 menit (ms)
    refresh-token-expiry: 604800000 # 7 hari (ms)

  # QR Code base URL — dipakai saat generate QR
  qr:
    base-url: ${QR_BASE_URL:http://localhost:8080/api/meja/scan}

  # Poin loyalitas
  poin:
    rupiah-per-poin: 100             # 1 poin = Rp 100
    rupiah-per-earned-poin: 1000     # earn 1 poin tiap Rp 1.000

# ── WebSocket ───────────────────────────────
websocket:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# ── OpenAPI / Swagger ────────────────────────
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  default-consumes-media-type: application/json
  default-produces-media-type: application/json

# ── Actuator (health check) ─────────────────
management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: when_authorized

---
# ─────────────────────────────────────────────
#  Profile: DEV
# ─────────────────────────────────────────────
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://aws-1-ap-southeast-1.pooler.supabase.com:5432/postgres?sslmode=require}
    username: ${DB_USERNAME:postgres.aouzclztehwqedmjvcjo}
    password: ${DB_PASSWORD:TubesPbo02123}
    hikari:
      maximum-pool-size: 5
      connection-timeout: 30000
      validation-timeout: 5000

  jpa:
